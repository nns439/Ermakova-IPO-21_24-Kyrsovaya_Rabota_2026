{% extends "base.html" %}
{% block title %}Категории клиентов{% endblock %}

{% block content %}
<section class="section">
    <div class="section-head">
        <p class="eyebrow">CRUD</p>
        <h1>Категории клиентов</h1>
    </div>
    <form class="admin-form compact-form" method="post">
        <input name="name" placeholder="Название" required>
        <input name="description" placeholder="Описание">
        <input type="number" name="priority" placeholder="Приоритет" value="1">
        <button class="btn" type="submit">Добавить</button>
    </form>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Название</th><th>Описание</th><th>Приоритет</th><th>Действия</th></tr></thead>
            <tbody>
                {% for category in categories %}
                    <tr>
                        <td>{{ category.name }}</td>
                        <td>{{ category.description }}</td>
                        <td>{{ category.priority }}</td>
                        <td>
                            <details>
                                <summary>Изменить</summary>
                                <form class="inline-edit" method="post">
                                    <input type="hidden" name="category_id" value="{{ category.id }}">
                                    <input name="name" value="{{ category.name }}">
                                    <input name="description" value="{{ category.description }}">
                                    <input type="number" name="priority" value="{{ category.priority }}">
                                    <button class="btn btn-small" type="submit">ОК</button>
                                </form>
                            </details>
                            <form method="post" action="{{ url_for('category_delete', category_id=category.id) }}">
                                <button class="link-danger" type="submit">Удалить</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
